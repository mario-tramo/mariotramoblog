name: SEO Audit

# Schedule: weekly (Sunday 06:00 UTC) + manual dispatch
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      apply_fixes:
        description: "Applica correzioni automatiche"
        type: boolean
        default: false
      commit_report:
        description: "Committa il report HTML"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SEO audit
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_CONTACT_NAME: ${{ secrets.NEXT_PUBLIC_CONTACT_NAME }}
          NEXT_PUBLIC_CONTACT_EMAIL: ${{ secrets.NEXT_PUBLIC_CONTACT_EMAIL }}
        run: |
          if [ "${{ github.event.inputs.apply_fixes }}" == "true" ]; then
            pnpm seo:audit:fix:apply --output docs/seo-audit-report.html
          else
            pnpm seo:audit --ci --output docs/seo-audit-report.html
          fi

      - name: Commit report
        if: ${{ github.event.inputs.commit_report != 'false' }}
        run: |
          git config user.name "SEO Audit Bot"
          git config user.email "bot@trmsport.com"
          git add docs/seo-audit-report.html
          git diff --cached --quiet || (
            git commit -m "chore: aggiorna report SEO audit [skip ci]"
            git push
          )
